<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
  <div class="card-img">
  <img src="/images/illustration-article.svg" alt="Article illustration">
</div>

  <div class="card-content">
    <span class="tag">Learning</span>
    <p class="date">Published 21 Dec 2023</p>

    <h2>HTML & CSS foundations</h2>

    <p class="desc">
      These languages are the backbone of every website,
      defining structure, content, and presentation.
    </p>

    <div class="author">
      <img src="/images/image-avatar.webp" alt="">
      <span>Greg Hooper</span>
    </div>
  </div>
</div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="">Ghod-Zilla12</a>.
  </footer>
</body>
  </html>
